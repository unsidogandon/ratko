quickstart:
  base: "<tg-emoji emoji-id=5463379725441341739>🪐</tg-emoji> <b>Привіт.</b> Твій юзербот <b>{}</b> тепер встановлено.\n\n<tg-emoji emoji-id=5134202243486057363>💫</tg-emoji> <b>Потрібна допомога?</b> Заходь у <a href=\"https://t.me/heroku_talks\">наш чат підтримки</a>. Ми допомагаємо <b>всім</b>.\n\n<tg-emoji emoji-id=4940480187436369099>💁‍♀️</tg-emoji> <b>Короткий посібник:</b>\n\n<tg-emoji emoji-id=5456197350416486261>1️⃣</tg-emoji> <b>Напиши</b> <code>.help</code><b>, щоб побачити список модулів</b>\n<tg-emoji emoji-id=5456261689026581678>2️⃣</tg-emoji> <b>Напиши</b> <code>.help &lt;Назва модуля/команда&gt;</code><b>, щоб побачити опис модуля</b>\n<tg-emoji emoji-id=5458366235886522404>3️⃣</tg-emoji> <b>Напиши</b> <code>.dlmod &lt;посилання&gt;</code><b>, щоб завантажити модуль за посиланням</b>\n<tg-emoji emoji-id=5456207331920483861>4️⃣</tg-emoji> <b>Напиши</b> <code>.loadmod</code> <b>у відповідь на файл, щоб завантажити з нього модуль</b>\n<tg-emoji emoji-id=5456185418997340146>5️⃣</tg-emoji> <b>Напиши</b> <code>.unloadmod &lt;Назва модуля&gt;</code><b>, щоб вивантажити модуль</b>\n\n<tg-emoji emoji-id=5456178297941561360>💡</tg-emoji> <b>Heroku підтримує модулі від Hikka, Friendly-Telegram та GeekTG, а також свої власні.</b>\n"
