settings:
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Виберіть варіант установки Heroku:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Процес установки на VDS виконується однією командою:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Примітка: Якщо у вас відсутні права sudo, виключіть відповідну частину команди.</i>"
  wsl_install: "<b>Завантаж WSL.</b> Для цього відкрий PowerShell з правами адміністратора і напиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Для встановлення WSL потрібна Windows 10 збірки 2004 або Windows 11 будь-якої версії та ПК з підтримкою віртуалізації. Для встановлення на більш ранні версії ОС звернись до</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">цієї сторінки</a>\n\n⬜️ <b>Перезавантаж ПК та запусти додаток Ubuntu 22.04.x</b> \n\n⬜️ <b>Встав у нього команду (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>При появі жовтих попереджень введи</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>замінивши /home/username/.local/bin на той шлях, про який йдеться в повідомленні</i>\n\n⬜️ <b>Встав команду (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Де отримати API_ID та API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Відео</a>"
  userland_install: "<b>Встанови UserLAnd за</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">посиланням</a>\n\n<b>Відкрий його, вибери Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Чекай встановлення дистрибутиву, можеш налити чаю</b>\n\n<b>Після успішного встановлення перед тобою відкриється термінал, пиши туди:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В кінці встановлення з'явиться посилання, переходи за ним і вводи дані свого акаунта для входу.\n\nВуаля! Ви встановили Heroku на UserLAnd.</b>"
  jamhost_install: "🪐 <b>Встановлення на 🧃 JamHost:</b>\n\n<b>Перейдіть до @jamhostbot, надішліть йому </b><code>/pay</code><b> і дотримуйтесь подальших інструкцій.</b>"
  hikkahost_install: "<b>🌘 Як встановити Heroku на HikkaHost?</b>\n\n1. Перейдіть до @hikkahost_bot\n2. Виберіть \"Установить\"\n3. Виберіть \"🪐 Heroku\"\n\nІ продовжуйте встановлення.\n\n<b>Після цього ви отримаєте посилання, відкрийте його та увійдіть у свій акаунт.</b>"
  lavhost_install: "⬇️ Щоб встановити, просто перейдіть до @lavhostbot і виконайте наступні кроки:\n\n• Введіть команду /buy, виберіть і оплатіть рахунок\n• За необхідності надішліть квитанцію про оплату\n• Після підтвердження оплати введіть /install і виберіть Heroku\n• Дотримуйтесь інструкцій бота"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <bЗанадто багато аргументів</b>"
  blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} додано до чорного списку юзербота</b>"
