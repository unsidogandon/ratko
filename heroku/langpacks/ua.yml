  desc: "<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <b>Що таке Userbot?</b>\n\n<tg-emoji emoji-id=5472238129849048175>😎</tg-emoji> Userbot - це <b>стороння програма</b>, яка взаємодіє з Telegram API для виконання <b>автоматизованих завдань від імені користувача</b>. Юзерботи можуть використовуватися для автоматизації різних завдань, таких як <b>надсилання повідомлень, приєднання до каналів, завантаження медіафайлів і багато іншого</b>.\n\n<tg-emoji emoji-id=5474667187258006816>😎</tg-emoji> Юзерботи відрізняються від звичайних ботів у Telegram тим, що <b>вони працюють на акаунті користувача</b>, а не на бот-акаунті. Це означає, що вони можуть мати доступ до більшої кількості функцій і мають більшу гнучкість у плані виконання дій.\n\n<tg-emoji emoji-id=5472267631979405211>🚫</tg-emoji> Однак важливо зазначити, що <b>юзерботи офіційно не підтримуються Telegram</b> і їх використання може порушувати умови використання платформи. Тому <b>користувачі мають бути обережними під час їх використання</b> і переконатися, що на їхньому акаунті не виконується шкідливий код.\n\n"
  no_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> Де посилання чи відповідь з шрифтом?"
  no_banner: "<tg-emoji emoji-id=6010394680179562842>😶</tg-emoji> <b>За вказаним посиланням </b><code>{link}</code><b> нічого не знайдено.\n\nПеревірте цілісність вашого файлу за посиланням, а також переконайтеся, що посилання вказує безпосередньо на файл.</b>"
